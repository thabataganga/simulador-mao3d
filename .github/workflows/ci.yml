name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: quality-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --runInBand

      - name: Build
        run: npm run build

      - name: Build bundle stats
        run: npm run build:analyze

      - name: Validate bundle threshold
        run: node scripts/print-bundle-stats.mjs
        env:
          THREE_CORE_MAX_BYTES: "500000"

      - name: Upload bundle stats artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/bundle-stats.json
          if-no-files-found: error
