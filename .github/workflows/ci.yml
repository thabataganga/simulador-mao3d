name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --runInBand

      - name: Build
        run: npm run build

      - name: Build bundle stats
        run: npm run build:analyze

      - name: Print bundle report
        run: node scripts/print-bundle-stats.mjs
